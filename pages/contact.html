<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Contact Details</title>
</head>
<body>
    <header>
        <h1>My Contact Details</h1>
        <h2>Contact me at helloworld@gggmail.com</h2>
    </header>

<form>
    <label for="firstname">First name</label>
    <input type="text" id="firstname">
<br />
    <label for="lastname">Last name</label>
    <input type="text" id="lastname">
<br />
    <label for="email">E-mail address</label>
    <input type="email" id="email">
<br />

<label for="contact-reason">Reason for contact</label>
<select name="reason" id="contact-reason">
    <option value="advertising">Advertising</option>
    <option value="sponsorship" selected>Sponsorships</option>
    <option value="business">Business</option>
</select>

<br />

<label for="extra-info"></label>
<textarea id="extra-info" placeholder="Any further comments..."></textarea>
</form>
</body>
</html>
